<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MUN · El Lorax · Consulta tu Rol</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --green-deep:   #1a3320;
      --green-mid:    #2d6a4f;
      --green-light:  #74c69d;
      --gold:         #f4a024;
      --cream:        #fdf6e3;
      --bark:         #6b3f1f;
      --sky:          #90e0ef;
      --white:        #ffffff;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: var(--green-deep);
      font-family: 'DM Sans', sans-serif;
      color: var(--cream);
      overflow-x: hidden;
      position: relative;
    }

    /* ── Decorative background ── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 10% 20%, rgba(45,106,79,.45) 0%, transparent 70%),
        radial-gradient(ellipse 50% 60% at 90% 80%, rgba(116,198,157,.15) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Animated leaves ── */
    .leaves {
      position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden;
    }
    .leaf {
      position: absolute;
      font-size: clamp(1.2rem, 3vw, 2.5rem);
      opacity: 0;
      animation: fall linear infinite;
    }
    @keyframes fall {
      0%   { transform: translateY(-80px) rotate(0deg);   opacity: 0; }
      10%  { opacity: .5; }
      90%  { opacity: .3; }
      100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
    }

    /* ── Layout ── */
    .page {
      position: relative; z-index: 1;
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center;
      padding: 2.5rem 1.25rem 4rem;
    }

    /* ── Header ── */
    header {
      text-align: center;
      margin-bottom: 2.5rem;
      animation: fadeDown .8s ease both;
    }
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-30px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .badge {
      display: inline-block;
      background: var(--gold);
      color: var(--green-deep);
      font-size: .7rem;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      padding: .35rem .85rem;
      border-radius: 99px;
      margin-bottom: 1rem;
    }
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 6vw, 3.8rem);
      line-height: 1.1;
      color: var(--white);
    }
    h1 span { color: var(--green-light); }
    .subtitle {
      margin-top: .75rem;
      font-size: 1rem;
      font-weight: 300;
      color: rgba(253,246,227,.65);
      max-width: 40ch;
      margin-inline: auto;
    }
    .lorax-icon {
      font-size: 4rem;
      margin-bottom: .5rem;
      display: block;
      filter: drop-shadow(0 4px 12px rgba(244,160,36,.4));
      animation: bounce 2.5s ease-in-out infinite;
    }
    @keyframes bounce {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-10px); }
    }

    /* ── Search card ── */
    .card {
      background: rgba(255,255,255,.06);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 20px;
      padding: 2rem;
      width: 100%;
      max-width: 540px;
      animation: fadeUp .8s .25s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    label {
      display: block;
      font-size: .8rem;
      font-weight: 500;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--green-light);
      margin-bottom: .6rem;
    }
    .input-wrap {
      position: relative;
    }
    input[type="text"] {
      width: 100%;
      padding: .9rem 1rem .9rem 3rem;
      background: rgba(255,255,255,.08);
      border: 1.5px solid rgba(116,198,157,.3);
      border-radius: 12px;
      color: var(--white);
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      outline: none;
      transition: border-color .25s, box-shadow .25s;
    }
    input[type="text"]::placeholder { color: rgba(255,255,255,.3); }
    input[type="text"]:focus {
      border-color: var(--green-light);
      box-shadow: 0 0 0 3px rgba(116,198,157,.18);
    }
    .input-icon {
      position: absolute; left: 1rem; top: 50%; transform: translateY(-50%);
      font-size: 1.1rem; pointer-events: none;
    }

    /* Suggestions dropdown */
    #suggestions {
      position: absolute; top: calc(100% + 6px); left: 0; right: 0;
      background: #1f4232;
      border: 1px solid rgba(116,198,157,.25);
      border-radius: 12px;
      overflow: hidden;
      z-index: 100;
      display: none;
      box-shadow: 0 12px 40px rgba(0,0,0,.4);
    }
    .suggestion-item {
      padding: .7rem 1rem;
      cursor: pointer;
      font-size: .95rem;
      transition: background .15s;
      border-bottom: 1px solid rgba(255,255,255,.06);
    }
    .suggestion-item:last-child { border-bottom: none; }
    .suggestion-item:hover, .suggestion-item.active { background: rgba(116,198,157,.18); }
    .suggestion-item strong { color: var(--green-light); }

    /* ── Result ── */
    #result {
      margin-top: 1.5rem;
      opacity: 0;
      transform: translateY(12px);
      transition: opacity .4s ease, transform .4s ease;
      pointer-events: none;
    }
    #result.visible {
      opacity: 1; transform: translateY(0); pointer-events: auto;
    }
    .result-card {
      background: linear-gradient(135deg, rgba(45,106,79,.55) 0%, rgba(26,51,32,.7) 100%);
      border: 1.5px solid rgba(116,198,157,.35);
      border-radius: 16px;
      padding: 1.5rem 1.5rem 1.75rem;
      position: relative;
      overflow: hidden;
    }
    .result-card::before {
      content: '🌳';
      position: absolute; right: -10px; bottom: -18px;
      font-size: 6rem; opacity: .08; pointer-events: none;
    }
    .result-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.3rem;
      color: var(--white);
      margin-bottom: .2rem;
    }
    .result-grade {
      font-size: .8rem;
      font-weight: 500;
      color: var(--gold);
      letter-spacing: .06em;
      text-transform: uppercase;
      margin-bottom: 1rem;
    }
    .divider {
      height: 1px; background: rgba(116,198,157,.25); margin-bottom: 1rem;
    }
    .pos-label {
      font-size: .72rem;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: rgba(116,198,157,.7);
      margin-bottom: .45rem;
    }
    .pos-text {
      font-size: 1.05rem;
      line-height: 1.55;
      color: var(--cream);
    }

    /* Not found */
    .not-found {
      text-align: center;
      padding: 1.25rem;
      color: rgba(253,246,227,.6);
      font-size: .95rem;
    }
    .not-found span { font-size: 1.8rem; display: block; margin-bottom: .5rem; }

    /* ── Footer ── */
    footer {
      margin-top: 3rem;
      text-align: center;
      font-size: .75rem;
      color: rgba(253,246,227,.3);
      animation: fadeUp 1s .5s ease both;
    }
  </style>
</head>
<body>

<!-- Falling leaves -->
<div class="leaves" id="leaves"></div>

<div class="page">
  <header>
    <span class="lorax-icon">🌲</span>
    <div class="badge">MUN · El Lorax</div>
    <h1>¿Cuál es tu<br/><span>posición política?</span></h1>
    <p class="subtitle">Escribe tu nombre para descubrir el rol que te fue asignado en el debate.</p>
  </header>

  <div class="card">
    <label for="buscar">🔍 Busca tu nombre</label>
    <div class="input-wrap">
      <span class="input-icon">👤</span>
      <input
        type="text"
        id="buscar"
        placeholder="Ej: TORRES MONTAÑEZ DANIEL…"
        autocomplete="off"
        spellcheck="false"
      />
      <div id="suggestions"></div>
    </div>

    <div id="result" role="region" aria-live="polite"></div>
  </div>

  <footer>Datos cargados desde MUN.json · Modelo de Naciones Unidas</footer>
</div>

<script>
  /* ── Falling leaves ── */
  const leafEmojis = ['🍃','🌿','🍀','🌱','🌾'];
  const leavesEl = document.getElementById('leaves');
  for (let i = 0; i < 18; i++) {
    const l = document.createElement('span');
    l.className = 'leaf';
    l.textContent = leafEmojis[Math.floor(Math.random() * leafEmojis.length)];
    l.style.left = Math.random() * 100 + 'vw';
    l.style.fontSize = (.8 + Math.random() * 1.8) + 'rem';
    l.style.animationDuration = (8 + Math.random() * 14) + 's';
    l.style.animationDelay = (Math.random() * 12) + 's';
    leavesEl.appendChild(l);
  }

  /* ── Data ── */
  let estudiantes = [];

  // Reads MUN.json from same folder (works on GitHub Pages)
  fetch('MUN.json')
    .then(r => { if (!r.ok) throw new Error('No se pudo cargar MUN.json'); return r.json(); })
    .then(data => { estudiantes = data; })
    .catch(err => console.error(err));

  /* ── Search logic ── */
  const input       = document.getElementById('buscar');
  const suggestBox  = document.getElementById('suggestions');
  const resultEl    = document.getElementById('result');

  function normalize(s) {
    return s.trim().toUpperCase()
      .normalize('NFD').replace(/[\u0300-\u036f]/g, '');
  }

  function showResult(est) {
    resultEl.innerHTML = `
      <div class="result-card">
        <div class="result-name">${est.estudiante}</div>
        <div class="result-grade">Grado ${est.grado}</div>
        <div class="divider"></div>
        <div class="pos-label">🗣 Posición Política Asignada</div>
        <div class="pos-text">${est.posicion}</div>
      </div>`;
    resultEl.classList.add('visible');
  }

  function showNotFound(query) {
    resultEl.innerHTML = `
      <div class="not-found">
        <span>🌵</span>
        No se encontró "<strong>${query}</strong>" en la lista.<br/>
        Verifica que escribiste tu apellido correctamente.
      </div>`;
    resultEl.classList.add('visible');
  }

  function hideSuggestions() {
    suggestBox.style.display = 'none';
    suggestBox.innerHTML = '';
  }

  let activeIdx = -1;

  input.addEventListener('input', () => {
    const q = normalize(input.value);
    activeIdx = -1;

    if (q.length < 2) {
      hideSuggestions();
      resultEl.classList.remove('visible');
      return;
    }

    const matches = estudiantes.filter(e => normalize(e.estudiante).includes(q));

    if (matches.length === 0) {
      hideSuggestions();
      showNotFound(input.value.trim());
      return;
    }

    if (matches.length === 1) {
      hideSuggestions();
      showResult(matches[0]);
      return;
    }

    // Show dropdown
    resultEl.classList.remove('visible');
    suggestBox.innerHTML = matches.map((e, i) =>
      `<div class="suggestion-item" data-idx="${i}" tabindex="-1">
        <strong>${highlight(e.estudiante, q)}</strong> — ${e.grado}
      </div>`
    ).join('');
    suggestBox.style.display = 'block';

    suggestBox.querySelectorAll('.suggestion-item').forEach(item => {
      item.addEventListener('mousedown', () => {
        const idx = parseInt(item.dataset.idx);
        input.value = matches[idx].estudiante;
        hideSuggestions();
        showResult(matches[idx]);
      });
    });
  });

  function highlight(name, q) {
    const re = new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'), 'gi');
    return name.replace(re, m => `<mark style="background:rgba(116,198,157,.35);border-radius:3px;padding:0 2px;">${m}</mark>`);
  }

  input.addEventListener('keydown', e => {
    const items = suggestBox.querySelectorAll('.suggestion-item');
    if (!items.length) return;

    if (e.key === 'ArrowDown') {
      e.preventDefault();
      activeIdx = (activeIdx + 1) % items.length;
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      activeIdx = (activeIdx - 1 + items.length) % items.length;
    } else if (e.key === 'Enter' && activeIdx >= 0) {
      items[activeIdx].dispatchEvent(new Event('mousedown'));
      return;
    } else { return; }

    items.forEach((it, i) => it.classList.toggle('active', i === activeIdx));
  });

  document.addEventListener('click', e => {
    if (!e.target.closest('.input-wrap')) hideSuggestions();
  });
</script>
</body>
</html>
