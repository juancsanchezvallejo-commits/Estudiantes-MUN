<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MUN · Consulta tu Rol</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:          #0e1f16;
      --surface:     rgba(255,255,255,.06);
      --border:      rgba(255,255,255,.11);
      --green:       #74c69d;
      --green-dim:   rgba(116,198,157,.18);
      --gold:        #f4a024;
      --cream:       #fdf6e3;
      --muted:       rgba(253,246,227,.5);
      --white:       #ffffff;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      color: var(--cream);
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background:
        radial-gradient(ellipse 70% 50% at 5% 10%,  rgba(45,106,79,.5)   0%, transparent 65%),
        radial-gradient(ellipse 55% 65% at 95% 85%, rgba(116,198,157,.12) 0%, transparent 65%);
    }
    .leaves { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
    .leaf { position: absolute; opacity: 0; animation: fall linear infinite; user-select: none; }
    @keyframes fall {
      0%   { transform: translateY(-80px) rotate(0deg);   opacity: 0; }
      8%   { opacity: .45; }
      92%  { opacity: .25; }
      100% { transform: translateY(108vh) rotate(400deg); opacity: 0; }
    }
    .page {
      position: relative; z-index: 1;
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center;
      padding: 2.5rem 1.25rem 5rem;
    }
    header { text-align: center; margin-bottom: 2.5rem; animation: fadeDown .7s ease both; }
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .tree {
      font-size: 4rem; display: block; margin-bottom: .4rem;
      filter: drop-shadow(0 6px 18px rgba(116,198,157,.35));
      animation: sway 4s ease-in-out infinite;
    }
    @keyframes sway {
      0%,100% { transform: rotate(-4deg); }
      50%      { transform: rotate(4deg);  }
    }
    .eyebrow {
      display: inline-block;
      background: var(--gold); color: #1a3320;
      font-size: .68rem; font-weight: 700; letter-spacing: .13em; text-transform: uppercase;
      padding: .3rem .8rem; border-radius: 99px; margin-bottom: .9rem;
    }
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.9rem, 5.5vw, 3.5rem);
      line-height: 1.1; color: var(--white);
    }
    h1 em { color: var(--green); font-style: normal; }
    .subtitle {
      margin-top: .7rem; font-size: .95rem; font-weight: 300;
      color: var(--muted); max-width: 38ch; margin-inline: auto;
    }
    .card {
      background: var(--surface);
      backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 1.75rem 1.75rem 2rem;
      width: 100%; max-width: 560px;
      animation: fadeUp .7s .2s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    label {
      display: block;
      font-size: .72rem; font-weight: 500; letter-spacing: .09em; text-transform: uppercase;
      color: var(--green); margin-bottom: .55rem;
    }
    .input-wrap { position: relative; }
    input[type="text"] {
      width: 100%;
      padding: .85rem 1rem .85rem 2.8rem;
      background: rgba(255,255,255,.07);
      border: 1.5px solid rgba(116,198,157,.28);
      border-radius: 12px;
      color: var(--white);
      font-family: 'DM Sans', sans-serif; font-size: 1rem;
      outline: none; transition: border-color .2s, box-shadow .2s;
    }
    input::placeholder { color: rgba(255,255,255,.28); }
    input:focus {
      border-color: var(--green);
      box-shadow: 0 0 0 3px rgba(116,198,157,.16);
    }
    .ico { position: absolute; left: .95rem; top: 50%; transform: translateY(-50%); font-size: 1rem; pointer-events: none; }
    #suggestions {
      position: absolute; top: calc(100% + 5px); left: 0; right: 0;
      background: #182e21; border: 1px solid rgba(116,198,157,.22);
      border-radius: 12px; overflow: hidden; z-index: 200;
      display: none; box-shadow: 0 14px 48px rgba(0,0,0,.45);
      max-height: 260px; overflow-y: auto;
    }
    .sg {
      padding: .65rem 1rem; cursor: pointer; font-size: .93rem;
      border-bottom: 1px solid rgba(255,255,255,.055);
      transition: background .12s;
    }
    .sg:last-child { border-bottom: none; }
    .sg:hover, .sg.active { background: var(--green-dim); }
    .sg b { color: var(--green); font-weight: 500; }
    .sg small { color: var(--muted); font-size: .8rem; margin-left: .4rem; }
    #result {
      margin-top: 1.4rem;
      opacity: 0; transform: translateY(10px);
      transition: opacity .35s ease, transform .35s ease;
      pointer-events: none;
    }
    #result.show { opacity: 1; transform: translateY(0); pointer-events: auto; }
    .rc { border-radius: 16px; overflow: hidden; border: 1.5px solid rgba(116,198,157,.3); background: linear-gradient(140deg, rgba(45,106,79,.5) 0%, rgba(14,31,22,.75) 100%); }
    .rc-bar {
      padding: .55rem 1.25rem;
      font-size: .7rem; font-weight: 700; letter-spacing: .1em; text-transform: uppercase;
      display: flex; align-items: center; gap: .5rem;
    }
    .rc-bar.lorax     { background: rgba(116,198,157,.22); color: #8de8b8; }
    .rc-bar.mitchell  { background: rgba(244,160,36,.18);  color: #f9c069; }
    .rc-bar.elementos { background: rgba(144,224,239,.15); color: #90e0ef; }
    .rc-bar.zootopia  { background: rgba(200,120,255,.15); color: #d09ef0; }
    .rc-bar.zombies   { background: rgba(255,100,100,.15); color: #f08080; }
    .rc-body { padding: 1.25rem 1.4rem 1.5rem; }
    .rc-name { font-family: 'Playfair Display', serif; font-size: 1.25rem; color: var(--white); margin-bottom: .15rem; }
    .rc-meta { font-size: .78rem; color: var(--gold); font-weight: 500; letter-spacing: .05em; text-transform: uppercase; margin-bottom: 1.1rem; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: .75rem; margin-bottom: .75rem; }
    @media (max-width: 420px) { .grid { grid-template-columns: 1fr; } }
    .chip {
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.09);
      border-radius: 10px; padding: .65rem .85rem;
    }
    .chip-label { font-size: .65rem; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--green); margin-bottom: .25rem; }
    .chip-val { font-size: .93rem; color: var(--cream); line-height: 1.35; }
    .pos-box {
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 10px; padding: .85rem 1rem;
    }
    .pos-label { font-size: .65rem; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--green); margin-bottom: .4rem; }
    .pos-val { font-size: .93rem; line-height: 1.65; color: var(--cream); }
    .nf { text-align: center; padding: 1.2rem; color: var(--muted); font-size: .93rem; }
    .nf span { font-size: 2rem; display: block; margin-bottom: .4rem; }
    footer { margin-top: 3rem; text-align: center; font-size: .72rem; color: rgba(253,246,227,.22); animation: fadeUp 1s .5s ease both; }
  </style>
</head>
<body>

<div class="leaves" id="leaves"></div>

<div class="page">
  <header>
    <span class="tree">🌲</span>
    <div class="eyebrow">MUN · 2025</div>
    <h1>Consulta tu <em>rol</em><br/>en el debate</h1>
    <p class="subtitle">Escribe tu nombre y descubre tu personaje, país y posición política.</p>
  </header>

  <div class="card">
    <label for="buscar">Busca tu nombre</label>
    <div class="input-wrap">
      <span class="ico">🔍</span>
      <input type="text" id="buscar"
             placeholder="Ej: TORRES, VARGAS, MEDINA…"
             autocomplete="off" spellcheck="false" />
      <div id="suggestions"></div>
    </div>
    <div id="result" role="region" aria-live="polite"></div>
  </div>

  <footer>10 mesas &nbsp;·&nbsp; 215 estudiantes &nbsp;·&nbsp; Datos cargados desde MUN.json</footer>
</div>

<script>
/* ── Leaves ── */
['🍃','🌿','🍀','🌱','🌾','🍂'].forEach(e => {
  for (let k = 0; k < 3; k++) {
    const l = document.createElement('span');
    l.className = 'leaf'; l.textContent = e;
    l.style.cssText = `left:${Math.random()*100}vw;font-size:${.7+Math.random()*1.6}rem;animation-duration:${9+Math.random()*13}s;animation-delay:${Math.random()*15}s`;
    document.getElementById('leaves').appendChild(l);
  }
});

/* ── Data ── */
let data = [];
fetch('MUN.json')
  .then(r => { if (!r.ok) throw Error(); return r.json(); })
  .then(d => { data = d; })
  .catch(() => console.error('No se pudo cargar MUN.json'));

/* ── Helpers ── */
function norm(s) {
  return s.trim().toUpperCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
}

function temaClass(tema) {
  if (!tema) return '';
  const t = tema.toLowerCase();
  if (t.includes('lorax'))    return 'lorax';
  if (t.includes('mitchell')) return 'mitchell';
  if (t.includes('elemento')) return 'elementos';
  if (t.includes('zootopia')) return 'zootopia';
  if (t.includes('zombie'))   return 'zombies';
  return '';
}

const temaEmojis = { lorax:'🌲', mitchell:'📱', elementos:'🔥', zootopia:'🦊', zombies:'🧟' };

function renderResult(s) {
  const cls   = temaClass(s.tema);
  const emoji = temaEmojis[cls] || '🎭';
  resEl.innerHTML = `
    <div class="rc">
      <div class="rc-bar ${cls}">${emoji}&nbsp; ${s.mesa} &nbsp;·&nbsp; ${s.tema}</div>
      <div class="rc-body">
        <div class="rc-name">${s.estudiante}</div>
        <div class="rc-meta">Grado ${s.grado}</div>
        <div class="grid">
          <div class="chip">
            <div class="chip-label">🎭 Personaje</div>
            <div class="chip-val">${s.personaje || '—'}</div>
          </div>
          <div class="chip">
            <div class="chip-label">🌍 País Asignado</div>
            <div class="chip-val">${s.pais || '—'}</div>
          </div>
        </div>
        <div class="pos-box">
          <div class="pos-label">🗣 Posición Política</div>
          <div class="pos-val">${s.posicion || '—'}</div>
        </div>
      </div>
    </div>`;
  resEl.classList.add('show');
}

function renderNotFound(q) {
  resEl.innerHTML = `<div class="nf"><span>🌵</span>No se encontró "<strong>${q}</strong>".<br/>Verifica la ortografía de tu apellido.</div>`;
  resEl.classList.add('show');
}

/* ── Search ── */
const inp   = document.getElementById('buscar');
const sugEl = document.getElementById('suggestions');
const resEl = document.getElementById('result');
let activeIdx = -1;

function hideSug() { sugEl.style.display = 'none'; sugEl.innerHTML = ''; activeIdx = -1; }

function hl(name, q) {
  return name.replace(
    new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi'),
    m => `<b>${m}</b>`
  );
}

inp.addEventListener('input', () => {
  const q = norm(inp.value);
  activeIdx = -1;
  if (q.length < 2) { hideSug(); resEl.classList.remove('show'); return; }

  const matches = data.filter(s => norm(s.estudiante).includes(q));

  if (!matches.length) { hideSug(); renderNotFound(inp.value.trim()); return; }
  if (matches.length === 1) { hideSug(); renderResult(matches[0]); return; }

  resEl.classList.remove('show');
  sugEl.innerHTML = matches.map((s, i) =>
    `<div class="sg" data-i="${i}">${hl(s.estudiante, q)}<small>${s.grado} · ${s.mesa}</small></div>`
  ).join('');
  sugEl.style.display = 'block';

  sugEl.querySelectorAll('.sg').forEach(el => {
    el.addEventListener('mousedown', () => {
      inp.value = matches[+el.dataset.i].estudiante;
      hideSug();
      renderResult(matches[+el.dataset.i]);
    });
  });
});

inp.addEventListener('keydown', e => {
  const items = sugEl.querySelectorAll('.sg');
  if (!items.length) return;
  if      (e.key === 'ArrowDown') { e.preventDefault(); activeIdx = (activeIdx + 1) % items.length; }
  else if (e.key === 'ArrowUp')   { e.preventDefault(); activeIdx = (activeIdx - 1 + items.length) % items.length; }
  else if (e.key === 'Enter' && activeIdx >= 0) { items[activeIdx].dispatchEvent(new Event('mousedown')); return; }
  else return;
  items.forEach((el, i) => el.classList.toggle('active', i === activeIdx));
});

document.addEventListener('click', e => {
  if (!e.target.closest('.input-wrap')) hideSug();
});
</script>
</body>
</html>
